
services:
  # 1. Redis (Message Broker)
  redis:
    image: redis:alpine
    restart: always

  # 2. PostgreSQL (Database) - NEW!
  db:
    image: postgres:13
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data # Persists DB data

  # 3. API
  api:
    build: .
    command: uvicorn redis_api:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - redis
      - db  # API waits for DB
    
# Locust Master: Hosts the UI and coordinates tests
  locust-master:
    image: locustio/locust
    ports:
      - "8089:8089" # Web UI
      # - "5557:5557" # Worker communication port
    volumes:
      - ./:/mnt/locust
    command: -f /mnt/locust/load_test.py --master

  # Locust Worker: Generates the actual traffic
  locust-worker:
    image: locustio/locust
    volumes:
      - ./:/mnt/locust
    # --master-host must match the service name above
    command: -f /mnt/locust/load_test.py --worker --master-host locust-master
    depends_on:
      - locust-master

      
  # 4. Worker
  worker:
    build: .
    command: python worker.py
    env_file:
      - .env
    depends_on:
      - redis
      - db  # Worker waits for DB

# Define the volume for Postgres persistence
volumes:
  postgres_data:
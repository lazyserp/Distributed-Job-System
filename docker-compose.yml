
services:
  # 1. Redis (Message Broker)
  redis:
    image: redis:alpine
    restart: always

  # 2. PostgreSQL (Database) - NEW!
  db:
    image: postgres:13
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data # Persists DB data

  # 3. API
  api:
    build: .
    command: uvicorn redis_api:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - redis
      - db  # API now waits for DB

  # 4. Worker
  worker:
    build: .
    command: python worker.py
    env_file:
      - .env
    depends_on:
      - redis
      - db  # Worker now waits for DB

# Define the volume for Postgres persistence
volumes:
  postgres_data:
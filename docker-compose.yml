version: '3.8'

services:
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  api:
    build: .
    command: uvicorn redis_api:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    env_file:
      - .env      #  Loads variables from .env file
    depends_on:
      - redis

  worker:
    build: .
    command: python worker.py
    volumes:
      - .:/app
    env_file:
      - .env      #  ADD THIS: Loads variables from .env file
    depends_on:
      - redis